[package]
name = "infisical-rdp-bridge"
version = "0.0.1"
edition = "2021"
description = "Phase 0 POC: IronRDP MITM bridge for Infisical PAM Windows/RDP support"
publish = false

[[bin]]
name = "rdp-bridge-spike"
path = "src/main.rs"

[dependencies]
# IronRDP crates. Versions match IronRDP master as of 2026-04-17.
# These are published on crates.io.
ironrdp-acceptor = "0.8"
ironrdp-connector = "0.8"
ironrdp-tokio = { version = "0.8", features = ["reqwest"] }
ironrdp-pdu = "0.7"
ironrdp-core = "0.1"
ironrdp-tls = { version = "0.2", features = ["rustls"] }

# Runtime + TLS (for acceptor-side TLS, since ironrdp-tls::upgrade is client-only)
tokio = { version = "1", features = ["full"] }
bytes = "1"
tokio-rustls = "0.26"
rustls = { version = "0.23", features = ["ring"] }
rcgen = "0.13"

# Utilities
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
clap = { version = "4", features = ["derive"] }

[profile.release]
lto = true
codegen-units = 1
