name: Build RDP Bridge Static Libs

# Cross-compile the Rust MITM bridge into static archives for every
# OS/arch the CLI targets with RDP support at release time. Scoped to
# the "client tier" platforms where users actually run `pam rdp access`
# (or the gateway serves RDP): linux amd64/arm64, darwin amd64/arm64,
# and windows amd64 via MinGW (so cgo cross-compile from ubuntu can
# link against it).
#
# Other platforms the main CLI targets (linux/386, arm 32-bit, BSDs,
# windows-arm64) ship with the RDP stub: they keep CGO=0 and get
# ErrRdpUnavailable at runtime. That matches option 2 of the build
# design: RDP is only available on the tier where users realistically
# use it.
#
# Artifacts:
#   rdp-bridge-x86_64-unknown-linux-gnu      : linux/amd64
#   rdp-bridge-aarch64-unknown-linux-gnu     : linux/arm64
#   rdp-bridge-x86_64-pc-windows-gnu         : windows/amd64 (MinGW)
#   rdp-bridge-x86_64-apple-darwin           : darwin/amd64
#   rdp-bridge-aarch64-apple-darwin          : darwin/arm64
#
# Called from:
#   - Release workflow as a prerequisite to goreleaser
#   - Direct workflow_dispatch for iterating on the matrix

on:
  workflow_call:
  workflow_dispatch:

jobs:
  rust-cross:
    name: cross (${{ matrix.target }})
    runs-on: ubuntu-latest-8-cores
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu        # linux/amd64
          - target: aarch64-unknown-linux-gnu       # linux/arm64
          - target: x86_64-pc-windows-gnu           # windows/amd64 (MinGW)
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: rdp-cross-cargo-${{ matrix.target }}-${{ hashFiles('packages/pam/handlers/rdp/native/Cargo.lock') }}
          restore-keys: rdp-cross-cargo-${{ matrix.target }}-

      - name: Install cross
        run: cargo install cross --locked --version 0.2.5

      - name: Install pinned Rust toolchain
        working-directory: packages/pam/handlers/rdp/native
        run: rustup show active-toolchain

      - name: cross build --release --target ${{ matrix.target }}
        working-directory: packages/pam/handlers/rdp/native
        run: cross build --release --target ${{ matrix.target }}

      - name: Upload static library
        uses: actions/upload-artifact@v4
        with:
          name: rdp-bridge-${{ matrix.target }}
          path: packages/pam/handlers/rdp/native/target/${{ matrix.target }}/release/libinfisical_rdp_bridge.a
          if-no-files-found: error
          retention-days: 7

  rust-darwin:
    name: macos-latest (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin     # darwin/amd64
          - target: aarch64-apple-darwin    # darwin/arm64
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: rdp-darwin-cargo-${{ matrix.target }}-${{ hashFiles('packages/pam/handlers/rdp/native/Cargo.lock') }}
          restore-keys: rdp-darwin-cargo-${{ matrix.target }}-

      - name: Install pinned Rust toolchain + target
        working-directory: packages/pam/handlers/rdp/native
        run: |
          rustup show active-toolchain
          rustup target add ${{ matrix.target }}

      - name: cargo build --release --target ${{ matrix.target }}
        working-directory: packages/pam/handlers/rdp/native
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload static library
        uses: actions/upload-artifact@v4
        with:
          name: rdp-bridge-${{ matrix.target }}
          path: packages/pam/handlers/rdp/native/target/${{ matrix.target }}/release/libinfisical_rdp_bridge.a
          if-no-files-found: error
          retention-days: 7
