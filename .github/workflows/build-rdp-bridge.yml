name: Build RDP Bridge Static Libs

# Cross-compile the Rust MITM bridge into static archives for every
# OS/arch the CLI ships with RDP support. Goreleaser downloads these
# as artifacts at release time and links them into per-target
# `infisical` binaries via CGO.
#
# Artifacts (11 total):
#   rdp-bridge-x86_64-unknown-linux-gnu          : linux/amd64
#   rdp-bridge-aarch64-unknown-linux-gnu         : linux/arm64
#   rdp-bridge-i686-unknown-linux-gnu            : linux/386
#   rdp-bridge-arm-unknown-linux-gnueabi         : linux/armv6
#   rdp-bridge-armv7-unknown-linux-gnueabihf     : linux/armv7
#   rdp-bridge-x86_64-unknown-freebsd            : freebsd/amd64
#   rdp-bridge-x86_64-unknown-netbsd             : netbsd/amd64
#   rdp-bridge-x86_64-pc-windows-gnu             : windows/amd64 (MinGW)
#   rdp-bridge-aarch64-pc-windows-gnullvm        : windows/arm64 (rust-lld)
#   rdp-bridge-x86_64-apple-darwin               : darwin/amd64
#   rdp-bridge-aarch64-apple-darwin              : darwin/arm64
#
# Called from:
#   - Release workflow as a prerequisite to goreleaser
#   - Direct workflow_dispatch for iterating on the matrix

on:
  workflow_call:
  workflow_dispatch:

jobs:
  rust-cross:
    # Cross-compile via the `cross` tool (docker-based sysroots). Covers
    # Linux (all arches), BSDs, and windows/amd64-gnu.
    name: cross (${{ matrix.target }})
    runs-on: ubuntu-latest-8-cores
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu        # linux/amd64
          - target: aarch64-unknown-linux-gnu       # linux/arm64
          - target: i686-unknown-linux-gnu          # linux/386
          - target: arm-unknown-linux-gnueabi       # linux/armv6
          - target: armv7-unknown-linux-gnueabihf   # linux/armv7
          - target: x86_64-unknown-freebsd          # freebsd/amd64
          - target: x86_64-unknown-netbsd           # netbsd/amd64
          - target: x86_64-pc-windows-gnu           # windows/amd64 (MinGW)
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: rdp-cross-cargo-${{ matrix.target }}-${{ hashFiles('packages/pam/handlers/rdp/native/Cargo.lock') }}
          restore-keys: rdp-cross-cargo-${{ matrix.target }}-

      - name: Install cross
        run: cargo install cross --locked --version 0.2.5

      - name: Install pinned Rust toolchain
        working-directory: packages/pam/handlers/rdp/native
        run: rustup show active-toolchain

      - name: cross build --release --target ${{ matrix.target }}
        working-directory: packages/pam/handlers/rdp/native
        run: cross build --release --target ${{ matrix.target }}

      - name: Upload static library
        uses: actions/upload-artifact@v4
        with:
          name: rdp-bridge-${{ matrix.target }}
          path: packages/pam/handlers/rdp/native/target/${{ matrix.target }}/release/libinfisical_rdp_bridge.a
          if-no-files-found: error
          retention-days: 7

  rust-winarm:
    # aarch64-pc-windows-gnullvm uses rust-lld (bundled with rustup) as
    # its linker, so no external cross toolchain is needed. The `cross`
    # tool doesn't cover this target, so we invoke cargo directly after
    # adding the rustup target.
    name: aarch64-pc-windows-gnullvm (native cargo + rust-lld)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: rdp-winarm-cargo-aarch64-pc-windows-gnullvm-${{ hashFiles('packages/pam/handlers/rdp/native/Cargo.lock') }}
          restore-keys: rdp-winarm-cargo-aarch64-pc-windows-gnullvm-

      - name: Install pinned Rust toolchain + target
        working-directory: packages/pam/handlers/rdp/native
        run: |
          rustup show active-toolchain
          rustup target add aarch64-pc-windows-gnullvm

      - name: cargo build --release --target aarch64-pc-windows-gnullvm
        working-directory: packages/pam/handlers/rdp/native
        run: cargo build --release --target aarch64-pc-windows-gnullvm

      - name: Upload static library
        uses: actions/upload-artifact@v4
        with:
          name: rdp-bridge-aarch64-pc-windows-gnullvm
          path: packages/pam/handlers/rdp/native/target/aarch64-pc-windows-gnullvm/release/libinfisical_rdp_bridge.a
          if-no-files-found: error
          retention-days: 7

  rust-darwin:
    name: macos-latest (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin     # darwin/amd64
          - target: aarch64-apple-darwin    # darwin/arm64
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: rdp-darwin-cargo-${{ matrix.target }}-${{ hashFiles('packages/pam/handlers/rdp/native/Cargo.lock') }}
          restore-keys: rdp-darwin-cargo-${{ matrix.target }}-

      - name: Install pinned Rust toolchain + target
        working-directory: packages/pam/handlers/rdp/native
        run: |
          rustup show active-toolchain
          rustup target add ${{ matrix.target }}

      - name: cargo build --release --target ${{ matrix.target }}
        working-directory: packages/pam/handlers/rdp/native
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload static library
        uses: actions/upload-artifact@v4
        with:
          name: rdp-bridge-${{ matrix.target }}
          path: packages/pam/handlers/rdp/native/target/${{ matrix.target }}/release/libinfisical_rdp_bridge.a
          if-no-files-found: error
          retention-days: 7
