name: Build and release CLI

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: >-
          Run goreleaser in --snapshot --skip=publish mode. No git tag needed,
          nothing is published. The built binaries are uploaded as a
          workflow artifact so you can download and sanity-check them. Safe
          way to exercise the full cross-compile matrix before cutting a
          real release.
        type: boolean
        default: true

  push:
    # run only against tags
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write  # Required for NPM OIDC auth for releases

jobs:
  validate-tag-branch:
    # Tag validation only makes sense on actual tag push. Skipped on
    # workflow_dispatch runs (dry-run or manual real release from any branch).
    if: github.event_name == 'push'
    uses: ./.github/workflows/pre-tag-validation.yml
  cli-tests:
    uses: ./.github/workflows/run-cli-e2e-tests.yml
    secrets: inherit

  build-rdp-bridge:
    uses: ./.github/workflows/build-rdp-bridge.yml

  # cli-integration-tests:
  #   name: Run tests before deployment
  #   uses: ./.github/workflows/run-cli-tests.yml
  #   secrets:
  #     CLI_TESTS_UA_CLIENT_ID: ${{ secrets.CLI_TESTS_UA_CLIENT_ID }}
  #     CLI_TESTS_UA_CLIENT_SECRET: ${{ secrets.CLI_TESTS_UA_CLIENT_SECRET }}
  #     CLI_TESTS_SERVICE_TOKEN: ${{ secrets.CLI_TESTS_SERVICE_TOKEN }}
  #     CLI_TESTS_PROJECT_ID: ${{ secrets.CLI_TESTS_PROJECT_ID }}
  #     CLI_TESTS_ENV_SLUG: ${{ secrets.CLI_TESTS_ENV_SLUG }}
  #     CLI_TESTS_USER_EMAIL: ${{ secrets.CLI_TESTS_USER_EMAIL }}
  #     CLI_TESTS_USER_PASSWORD: ${{ secrets.CLI_TESTS_USER_PASSWORD }}
  #     CLI_TESTS_INFISICAL_VAULT_FILE_PASSPHRASE: ${{ secrets.CLI_TESTS_INFISICAL_VAULT_FILE_PASSPHRASE }}

  npm-release:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
    runs-on: ubuntu-latest
    env:
      working-directory: ./npm
    needs:
      # - cli-integration-tests
      - goreleaser
      - validate-tag-branch
      - cli-tests
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Extract version
        run: |
          VERSION=$(echo ${{ github.ref_name }} | sed 's/v//')
          echo "Version extracted: $VERSION"
          echo "CLI_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Print version
        run: echo ${{ env.CLI_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@8f152de45cc393bb48ce5d89d36b731f54556e65 # v4.0.0
        with:
          node-version: '24.14.0'
          cache: "npm"
          cache-dependency-path: ./npm/package-lock.json
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        working-directory: ${{ env.working-directory }}
        run: npm install --ignore-scripts

      - name: Set NPM version
        working-directory: ${{ env.working-directory }}
        run: npm version ${{ env.CLI_VERSION }} --allow-same-version --no-git-tag-version

      - name: Pack NPM
        working-directory: ${{ env.working-directory }}
        run: npm pack

      - name: Publish NPM
        working-directory: ${{ env.working-directory }}
        run: npm publish --tarball=./infisical-sdk-${{github.ref_name}} --access public

  goreleaser:
    runs-on: ubuntu-latest-8-cores
    needs:
      - validate-tag-branch
      - cli-tests
      - build-rdp-bridge
    if: |
      always() &&
      needs.cli-tests.result == 'success' &&
      needs.build-rdp-bridge.result == 'success' &&
      (github.event_name == 'workflow_dispatch' || needs.validate-tag-branch.result == 'success')
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: 🐋 Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - run: git fetch --force --tags
      - run: echo "Ref name ${{github.ref_name}}"
      - uses: actions/setup-go@v3
        with:
          go-version: "1.25.9"
          cache: true
          cache-dependency-path: go.sum
      - name: Setup for libssl1.0-dev
        run: |
          echo 'deb http://security.ubuntu.com/ubuntu bionic-security main' | sudo tee -a /etc/apt/sources.list
          sudo apt-key adv --keyserver keyserver.ubuntu.com --recv-keys 3B4FE6ACC0B21F32
          sudo apt update
          sudo apt-get install -y libssl1.0-dev
      - name: Install cross-compile toolchains for RDP tier
        run: |
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            gcc-i686-linux-gnu \
            gcc-arm-linux-gnueabi \
            gcc-arm-linux-gnueabihf \
            gcc-mingw-w64-x86-64
      # zig cc is used as the $CC for darwin + FreeBSD + NetBSD
      # goreleaser builds; apt doesn't ship cgo-capable cross compilers
      # for those targets.
      - name: Install zig for darwin cross-compile
        uses: mlugg/setup-zig@v1
        with:
          version: 0.14.0
      - name: Download RDP bridge static libs
        uses: actions/download-artifact@v4
        with:
          pattern: rdp-bridge-*
          path: /tmp/rdp-bridge-artifacts/
      - name: Stage RDP bridge static libs into cargo target dirs
        run: |
          set -euo pipefail
          for triple in \
            x86_64-unknown-linux-gnu \
            aarch64-unknown-linux-gnu \
            i686-unknown-linux-gnu \
            arm-unknown-linux-gnueabi \
            armv7-unknown-linux-gnueabihf \
            x86_64-pc-windows-gnu \
            x86_64-apple-darwin \
            aarch64-apple-darwin; do
            target_dir="packages/pam/handlers/rdp/native/target/$triple/release"
            mkdir -p "$target_dir"
            cp "/tmp/rdp-bridge-artifacts/rdp-bridge-$triple/libinfisical_rdp_bridge.a" "$target_dir/"
          done
      - name: GoReleaser (dry-run snapshot)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        uses: goreleaser/goreleaser-action@v4
        with:
          distribution: goreleaser-pro
          version: v1.26.2-pro
          args: release --clean --snapshot --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GO_RELEASER_GITHUB_TOKEN }}
          POSTHOG_API_KEY_FOR_CLI: ${{ secrets.POSTHOG_API_KEY_FOR_CLI }}
          FURY_TOKEN: ${{ secrets.FURYPUSHTOKEN }}
          AUR_KEY: ${{ secrets.AUR_KEY }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
      - name: GoReleaser (release)
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        uses: goreleaser/goreleaser-action@v4
        with:
          distribution: goreleaser-pro
          version: v1.26.2-pro
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GO_RELEASER_GITHUB_TOKEN }}
          POSTHOG_API_KEY_FOR_CLI: ${{ secrets.POSTHOG_API_KEY_FOR_CLI }}
          FURY_TOKEN: ${{ secrets.FURYPUSHTOKEN }}
          AUR_KEY: ${{ secrets.AUR_KEY }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
      - name: Upload dry-run dist as workflow artifact
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        uses: actions/upload-artifact@v4
        with:
          name: goreleaser-dist-linux
          path: dist/
          retention-days: 7
      - uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - name: Install mkrepo and dependencies
        run: pip install mkrepo univers boto3
      - name: Install AWS CLI
        run: pip install awscli
      - name: Install rpm-sign
        run: sudo apt-get install -y rpm
      - uses: ruby/setup-ruby@354a1ad156761f5ee2b7b13fa8e09943a5e8d252
        with:
          ruby-version: "3.3" # Not needed with a .ruby-version, .tool-versions or mise.toml
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
      - name: Install deb-s3
        run: gem install deb-s3
      - name: Configure GPG Key
        run: echo -n "$GPG_SIGNING_KEY" | base64 --decode | gpg --batch --import
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_KEY_PASSPHRASE: ${{ secrets.GPG_SIGNING_KEY_PASSPHRASE }}
      - name: Configure APK Signing Key
        run: |
          echo -n "$APK_PRIVATE_KEY" | base64 --decode > /tmp/infisical-apk.rsa
          chmod 600 /tmp/infisical-apk.rsa
        env:
          APK_PRIVATE_KEY: ${{ secrets.APK_PRIVATE_KEY }}
      - name: Publish packages to repositories
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        run: bash upload_to_s3.sh
        env:
          INFISICAL_CLI_S3_BUCKET: ${{ secrets.INFISICAL_CLI_S3_BUCKET }}
          INFISICAL_CLI_REPO_SIGNING_KEY_ID: ${{ secrets.INFISICAL_CLI_REPO_SIGNING_KEY_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.INFISICAL_CLI_REPO_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.INFISICAL_CLI_REPO_AWS_SECRET_ACCESS_KEY }}
          APK_PRIVATE_KEY_PATH: /tmp/infisical-apk.rsa
      - name: Invalidate Cloudfront cache
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        run: aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_DISTRIBUTION_ID --paths '/rpm/Packages/*' '/rpm/repodata/*' '/deb/dists/stable/*' '/apk/stable/main/*'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.INFISICAL_CLI_REPO_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.INFISICAL_CLI_REPO_AWS_SECRET_ACCESS_KEY }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.INFISICAL_CLI_REPO_CLOUDFRONT_DISTRIBUTION_ID }}

  # Currently only supports Windows amd64
  goreleaser-windows:
    runs-on: windows-2022
    needs:
      - validate-tag-branch
      - cli-tests
    if: |
      always() &&
      needs.cli-tests.result == 'success' &&
      (github.event_name == 'workflow_dispatch' || needs.validate-tag-branch.result == 'success')
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Fetch all tags
        run: git fetch --force --tags

      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: "1.25.9"
          cache: true
          cache-dependency-path: go.sum

      - name: 🐋 Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: GoReleaser Windows (dry-run snapshot)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        uses: goreleaser/goreleaser-action@v4
        with:
          distribution: goreleaser-pro
          version: v1.26.2-pro
          args: release --clean --config .goreleaser-windows.yaml --skip-validate --snapshot --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GO_RELEASER_GITHUB_TOKEN }}
          POSTHOG_API_KEY_FOR_CLI: ${{ secrets.POSTHOG_API_KEY_FOR_CLI }}
          AUR_KEY: ${{ secrets.AUR_KEY }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
      - name: GoReleaser Windows (release)
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        uses: goreleaser/goreleaser-action@v4
        with:
          distribution: goreleaser-pro
          version: v1.26.2-pro
          args: release --clean --config .goreleaser-windows.yaml --skip-validate
        env:
          GITHUB_TOKEN: ${{ secrets.GO_RELEASER_GITHUB_TOKEN }}
          POSTHOG_API_KEY_FOR_CLI: ${{ secrets.POSTHOG_API_KEY_FOR_CLI }}
          AUR_KEY: ${{ secrets.AUR_KEY }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
      - name: Upload dry-run dist as workflow artifact
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        uses: actions/upload-artifact@v4
        with:
          name: goreleaser-dist-windows
          path: dist/
          retention-days: 7


