name: Build and release CLI

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: >-
          Do a dry-run (no artifacts are published and no release is created)
        type: boolean
        default: true

  push:
    # run only against tags
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write # Required for NPM OIDC auth for releases

jobs:
  validate-tag-branch:
    # Tag validation only makes sense on actual tag push. Skipped on
    # workflow_dispatch runs (dry-run or manual real release from any branch).
    if: github.event_name == 'push'
    uses: ./.github/workflows/pre-tag-validation.yml
  cli-tests:
    uses: ./.github/workflows/run-cli-e2e-tests.yml
    secrets: inherit

  build-rdp-bridge:
    uses: ./.github/workflows/build-rdp-bridge.yml

  # cli-integration-tests:
  #   name: Run tests before deployment
  #   uses: ./.github/workflows/run-cli-tests.yml
  #   secrets:
  #     CLI_TESTS_UA_CLIENT_ID: ${{ secrets.CLI_TESTS_UA_CLIENT_ID }}
  #     CLI_TESTS_UA_CLIENT_SECRET: ${{ secrets.CLI_TESTS_UA_CLIENT_SECRET }}
  #     CLI_TESTS_SERVICE_TOKEN: ${{ secrets.CLI_TESTS_SERVICE_TOKEN }}
  #     CLI_TESTS_PROJECT_ID: ${{ secrets.CLI_TESTS_PROJECT_ID }}
  #     CLI_TESTS_ENV_SLUG: ${{ secrets.CLI_TESTS_ENV_SLUG }}
  #     CLI_TESTS_USER_EMAIL: ${{ secrets.CLI_TESTS_USER_EMAIL }}
  #     CLI_TESTS_USER_PASSWORD: ${{ secrets.CLI_TESTS_USER_PASSWORD }}
  #     CLI_TESTS_INFISICAL_VAULT_FILE_PASSPHRASE: ${{ secrets.CLI_TESTS_INFISICAL_VAULT_FILE_PASSPHRASE }}

  npm-release:
    if: |
      always() &&
      (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)) &&
      needs.goreleaser.result == 'success' &&
      needs.goreleaser-darwin.result == 'success' &&
      needs.cli-tests.result == 'success' &&
      (github.event_name == 'workflow_dispatch' || needs.validate-tag-branch.result == 'success')
    runs-on: ubuntu-latest
    env:
      working-directory: ./npm
    needs:
      # - cli-integration-tests
      - goreleaser
      - goreleaser-darwin
      - validate-tag-branch
      - cli-tests
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          fetch-depth: 0

      - name: Extract version
        run: |
          VERSION=$(echo ${{ github.ref_name }} | sed 's/v//')
          echo "Version extracted: $VERSION"
          echo "CLI_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Print version
        run: echo ${{ env.CLI_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@8f152de45cc393bb48ce5d89d36b731f54556e65 # v4.0.0
        with:
          node-version: "24.14.0"
          cache: "npm"
          cache-dependency-path: ./npm/package-lock.json
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        working-directory: ${{ env.working-directory }}
        run: npm install --ignore-scripts

      - name: Set NPM version
        working-directory: ${{ env.working-directory }}
        run: npm version ${{ env.CLI_VERSION }} --allow-same-version --no-git-tag-version

      - name: Pack NPM
        working-directory: ${{ env.working-directory }}
        run: npm pack

      - name: Publish NPM
        working-directory: ${{ env.working-directory }}
        run: npm publish --tarball=./infisical-sdk-${{github.ref_name}} --access public

  goreleaser:
    runs-on: ubuntu-latest-8-cores
    needs:
      - validate-tag-branch
      - cli-tests
      - build-rdp-bridge
    if: |
      always() &&
      needs.cli-tests.result == 'success' &&
      needs.build-rdp-bridge.result == 'success' &&
      (github.event_name == 'workflow_dispatch' || needs.validate-tag-branch.result == 'success')
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          fetch-depth: 0
      - name: 🐋 Login to Docker Hub
        uses: docker/login-action@465a07811f14bebb1938fbed4728c6a1ff8901fc # v2.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@885d1462b80bc1c1c7f0b00334ad271f09369c55 # v2.10.0
      - run: git fetch --force --tags
      - run: echo "Ref name ${{github.ref_name}}"
      - uses: actions/setup-go@be3c94b385c4f180051c996d336f57a34c397495 # v3.6.1
        with:
          go-version: "1.25.11"
          cache: true
          cache-dependency-path: go.sum
      - name: Setup for libssl1.0-dev
        run: |
          echo 'deb http://security.ubuntu.com/ubuntu bionic-security main' | sudo tee -a /etc/apt/sources.list
          sudo apt-key adv --keyserver keyserver.ubuntu.com --recv-keys 3B4FE6ACC0B21F32
          sudo apt update
          sudo apt-get install -y libssl1.0-dev
      - name: Install cross-compile toolchains for RDP tier
        run: |
          set -euo pipefail
          sudo apt-get install -y gcc-mingw-w64-x86-64
          MUSL_CROSS_TAG=20260430
          sudo mkdir -p /opt/musl-cross
          for triple in \
            x86_64-unknown-linux-musl \
            aarch64-unknown-linux-musl \
            i686-unknown-linux-musl \
            arm-unknown-linux-musleabi \
            armv7-unknown-linux-musleabihf; do
            case "$triple" in
              x86_64-unknown-linux-musl)       sha=2495cfe18fc1f406d5cab93d902176af75a78f0ae93137f3e8b2df7708ec32fa ;;
              aarch64-unknown-linux-musl)      sha=9303385fc29f8197004f641f96382196d56e4ec6dd975bff8ddd66641378628d ;;
              i686-unknown-linux-musl)         sha=94dad4ea891b8ac701f9b590dc6db37461c3606ccc20f1c3dfe3901b1e248729 ;;
              arm-unknown-linux-musleabi)      sha=8799be632cd66469a269f5aefbdb0266bf240b37194fc9cc3a34351c932bae2b ;;
              armv7-unknown-linux-musleabihf)  sha=1b7d3fb5fbbe94357c094116e6fbf441e5074fc9c512415d8d9c758309705f1d ;;
            esac
            tarball="/tmp/${triple}.tar.xz"
            curl --retry 5 --retry-delay 10 --retry-all-errors \
                 --connect-timeout 30 --max-time 240 \
                 -fsSL "https://github.com/cross-tools/musl-cross/releases/download/${MUSL_CROSS_TAG}/${triple}.tar.xz" \
                 -o "$tarball"
            echo "${sha}  ${tarball}" | sha256sum -c -
            sudo tar -xJ -f "$tarball" -C /opt/musl-cross
            rm -f "$tarball"
            echo "/opt/musl-cross/${triple}/bin" >> "$GITHUB_PATH"
          done
      - name: Download RDP bridge static libs
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: rdp-bridge-*
          path: /tmp/rdp-bridge-artifacts/
      - name: Stage RDP bridge static libs into cargo target dirs
        run: |
          set -euo pipefail
          for triple in \
            x86_64-unknown-linux-musl \
            aarch64-unknown-linux-musl \
            i686-unknown-linux-musl \
            arm-unknown-linux-musleabi \
            armv7-unknown-linux-musleabihf \
            x86_64-pc-windows-gnu; do
            target_dir="packages/pam/handlers/rdp/native/target/$triple/release"
            mkdir -p "$target_dir"
            cp "/tmp/rdp-bridge-artifacts/rdp-bridge-$triple/libinfisical_rdp_bridge.a" "$target_dir/"
          done
      - name: GoReleaser (dry-run snapshot)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        uses: goreleaser/goreleaser-action@5fdedb94abba051217030cc86d4523cf3f02243d # v4.6.0
        with:
          distribution: goreleaser-pro
          version: v1.26.2-pro
          args: release --clean --snapshot --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GO_RELEASER_GITHUB_TOKEN }}
          POSTHOG_API_KEY_FOR_CLI: ${{ secrets.POSTHOG_API_KEY_FOR_CLI }}
          FURY_TOKEN: ${{ secrets.FURYPUSHTOKEN }}
          AUR_KEY: ${{ secrets.AUR_KEY }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
      - name: Upload dry-run dist as workflow artifact
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: goreleaser-dist-linux
          path: dist/
          retention-days: 7
      - name: GoReleaser (release)
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        uses: goreleaser/goreleaser-action@5fdedb94abba051217030cc86d4523cf3f02243d # v4.6.0
        with:
          distribution: goreleaser-pro
          version: v1.26.2-pro
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GO_RELEASER_GITHUB_TOKEN }}
          POSTHOG_API_KEY_FOR_CLI: ${{ secrets.POSTHOG_API_KEY_FOR_CLI }}
          FURY_TOKEN: ${{ secrets.FURYPUSHTOKEN }}
          AUR_KEY: ${{ secrets.AUR_KEY }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
      - uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c # v4.9.1
        with:
          python-version: "3.9"
      - name: Install mkrepo and dependencies
        run: |
          python -m venv /opt/mkrepo-venv
          /opt/mkrepo-venv/bin/pip install mkrepo==1.0.2 univers==30.9.0 boto3==1.17.5 botocore==1.20.5
          echo "/opt/mkrepo-venv/bin" >> "$GITHUB_PATH"
      - name: Install rpm-sign and unzip
        run: sudo apt-get update && sudo apt-get install -y rpm unzip
      # AWS CLI v2 (pinned), kept outside the pip env: awscli (pip, v1) cannot
      # coexist with mkrepo's boto3 1.17.5 (different s3transfer). v2 is bundled.
      - name: Install AWS CLI v2 (pinned)
        run: |
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64-2.15.0.zip" -o /tmp/awscliv2.zip
          unzip -q /tmp/awscliv2.zip -d /tmp
          sudo /tmp/aws/install --update
          rm -rf /tmp/aws /tmp/awscliv2.zip
      - uses: ruby/setup-ruby@354a1ad156761f5ee2b7b13fa8e09943a5e8d252 # v1.229.0
        with:
          ruby-version: "3.3" # Not needed with a .ruby-version, .tool-versions or mise.toml
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
      - name: Install deb-s3
        run: gem install deb-s3
      - name: Configure GPG Key
        run: echo -n "$GPG_SIGNING_KEY" | base64 --decode | gpg --batch --import
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_KEY_PASSPHRASE: ${{ secrets.GPG_SIGNING_KEY_PASSPHRASE }}
      - name: Configure APK Signing Key
        run: |
          echo -n "$APK_PRIVATE_KEY" | base64 --decode > /tmp/infisical-apk.rsa
          chmod 600 /tmp/infisical-apk.rsa
        env:
          APK_PRIVATE_KEY: ${{ secrets.APK_PRIVATE_KEY }}
      # upload_to_s3.sh syncs the whole apk repo down before rebuilding the index, and
      # that repo holds the full backfilled history.
      - name: Free disk space before publish
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          df -h /
      - name: Publish packages to repositories
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        run: bash upload_to_s3.sh
        env:
          AWS_DEFAULT_REGION: us-east-1
          INFISICAL_CLI_S3_BUCKET: ${{ secrets.INFISICAL_CLI_S3_BUCKET }}
          INFISICAL_CLI_REPO_SIGNING_KEY_ID: ${{ secrets.INFISICAL_CLI_REPO_SIGNING_KEY_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.INFISICAL_CLI_REPO_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.INFISICAL_CLI_REPO_AWS_SECRET_ACCESS_KEY }}
          APK_PRIVATE_KEY_PATH: /tmp/infisical-apk.rsa
      - name: Invalidate Cloudfront cache
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        run: aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_DISTRIBUTION_ID --paths '/rpm/*' '/deb/dists/stable/*' '/apk/stable/main/*'
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: ${{ secrets.INFISICAL_CLI_REPO_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.INFISICAL_CLI_REPO_AWS_SECRET_ACCESS_KEY }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.INFISICAL_CLI_REPO_CLOUDFRONT_DISTRIBUTION_ID }}

  goreleaser-darwin:
    runs-on: macos-latest
    needs:
      - validate-tag-branch
      - cli-tests
      - build-rdp-bridge
    if: |
      always() &&
      needs.cli-tests.result == 'success' &&
      needs.build-rdp-bridge.result == 'success' &&
      (github.event_name == 'workflow_dispatch' || needs.validate-tag-branch.result == 'success')
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Fetch all tags
        run: git fetch --force --tags

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.25.11"
          cache: true
          cache-dependency-path: go.sum

      - name: Download darwin RDP bridge static libs
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: rdp-bridge-*-apple-darwin
          path: /tmp/rdp-bridge-artifacts/

      - name: Stage darwin RDP bridge static libs
        run: |
          set -euo pipefail
          for triple in x86_64-apple-darwin aarch64-apple-darwin; do
            target_dir="packages/pam/handlers/rdp/native/target/$triple/release"
            mkdir -p "$target_dir"
            cp "/tmp/rdp-bridge-artifacts/rdp-bridge-$triple/libinfisical_rdp_bridge.a" "$target_dir/"
          done

      - name: GoReleaser Darwin (dry-run snapshot)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        uses: goreleaser/goreleaser-action@5fdedb94abba051217030cc86d4523cf3f02243d # v4.6.0
        with:
          distribution: goreleaser-pro
          version: v1.26.2-pro
          args: release --clean --config .goreleaser-darwin.yaml --snapshot --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GO_RELEASER_GITHUB_TOKEN }}
          POSTHOG_API_KEY_FOR_CLI: ${{ secrets.POSTHOG_API_KEY_FOR_CLI }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}

      - name: GoReleaser Darwin (release)
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        uses: goreleaser/goreleaser-action@5fdedb94abba051217030cc86d4523cf3f02243d # v4.6.0
        with:
          distribution: goreleaser-pro
          version: v1.26.2-pro
          args: release --clean --config .goreleaser-darwin.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GO_RELEASER_GITHUB_TOKEN }}
          POSTHOG_API_KEY_FOR_CLI: ${{ secrets.POSTHOG_API_KEY_FOR_CLI }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}

      - name: Upload dry-run dist as workflow artifact
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: goreleaser-dist-darwin
          path: dist/
          retention-days: 7

  # Builds the Windows Server container images (→ Docker Hub). The
  # binary baked in is RDP-enabled via MinGW CGO, matching the
  # user-facing Windows zip.
  #
  # The Rust bridge is built here natively rather than downloaded from
  # build-rdp-bridge: cross-rs's MinGW produces MSVCRT-ABI archives,
  # but windows-2022's MinGW 14 is UCRT-based, which doesn't resolve
  # MSVCRT-only symbols like __iob_func. Building both the .a and the
  # Go binary on the same runner guarantees the ABIs match.
  goreleaser-windows:
    runs-on: windows-2022
    needs:
      - validate-tag-branch
      - cli-tests
    if: |
      always() &&
      needs.cli-tests.result == 'success' &&
      (github.event_name == 'workflow_dispatch' || needs.validate-tag-branch.result == 'success')
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          fetch-depth: 0

      - name: Fetch all tags
        run: git fetch --force --tags

      - name: Set up Go
        uses: actions/setup-go@be3c94b385c4f180051c996d336f57a34c397495 # v3.6.1
        with:
          go-version: "1.25.11"
          cache: true
          cache-dependency-path: go.sum

      - name: Cache cargo registry + target
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/pam/handlers/rdp/native/target
          key: rdp-bridge-windows-cargo-${{ hashFiles('packages/pam/handlers/rdp/native/Cargo.lock') }}
          restore-keys: rdp-bridge-windows-cargo-

      - name: Install pinned Rust toolchain + gnu target
        working-directory: packages/pam/handlers/rdp/native
        shell: pwsh
        run: |
          rustup show active-toolchain
          rustup target add x86_64-pc-windows-gnu

      - name: Build Rust bridge for x86_64-pc-windows-gnu
        working-directory: packages/pam/handlers/rdp/native
        shell: pwsh
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: 🐋 Login to Docker Hub
        uses: docker/login-action@465a07811f14bebb1938fbed4728c6a1ff8901fc # v2.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: GoReleaser Windows (dry-run snapshot)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        uses: goreleaser/goreleaser-action@5fdedb94abba051217030cc86d4523cf3f02243d # v4.6.0
        with:
          distribution: goreleaser-pro
          version: v1.26.2-pro
          args: release --clean --config .goreleaser-windows.yaml --skip-validate --snapshot --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GO_RELEASER_GITHUB_TOKEN }}
          POSTHOG_API_KEY_FOR_CLI: ${{ secrets.POSTHOG_API_KEY_FOR_CLI }}
          AUR_KEY: ${{ secrets.AUR_KEY }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
      - name: GoReleaser Windows (release)
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        uses: goreleaser/goreleaser-action@5fdedb94abba051217030cc86d4523cf3f02243d # v4.6.0
        with:
          distribution: goreleaser-pro
          version: v1.26.2-pro
          args: release --clean --config .goreleaser-windows.yaml --skip-validate
        env:
          GITHUB_TOKEN: ${{ secrets.GO_RELEASER_GITHUB_TOKEN }}
          POSTHOG_API_KEY_FOR_CLI: ${{ secrets.POSTHOG_API_KEY_FOR_CLI }}
          AUR_KEY: ${{ secrets.AUR_KEY }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
      - name: Upload dry-run dist as workflow artifact
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: goreleaser-dist-windows
          path: dist/
          retention-days: 7
