name: Test Update Instructions

on:
  pull_request:
  push:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v4
        with:
          go-version: "1.24.13"
      - name: Run unit tests
        run: go test ./packages/util/ -run TestGetUpdateInstructions -v

  integration-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v4
        with:
          go-version: "1.24.13"
      - name: Build CLI
        run: go build -o infisical.exe .

      - name: Test scoop path detection
        shell: pwsh
        run: |
          $scoopPath = "$env:USERPROFILE\scoop\apps\infisical\current"
          New-Item -ItemType Directory -Force -Path $scoopPath | Out-Null
          Copy-Item infisical.exe "$scoopPath\infisical.exe"
          $output = & "$scoopPath\infisical.exe" vault 2>&1 | Out-String
          Write-Host "Output: $output"
          if ($output -notmatch "scoop update infisical") {
            Write-Error "Expected 'scoop update infisical', got: $output"
            exit 1
          }

      - name: Test npm path detection
        shell: pwsh
        run: |
          $npmPath = "$env:APPDATA\npm\node_modules\@infisical\cli\bin"
          New-Item -ItemType Directory -Force -Path $npmPath | Out-Null
          Copy-Item infisical.exe "$npmPath\infisical.exe"
          $output = & "$npmPath\infisical.exe" vault 2>&1 | Out-String
          Write-Host "Output: $output"
          if ($output -notmatch "npm update -g @infisical/cli") {
            Write-Error "Expected 'npm update -g @infisical/cli', got: $output"
            exit 1
          }

      - name: Test winget path detection
        shell: pwsh
        run: |
          $wingetPath = "$env:LOCALAPPDATA\Microsoft\WinGet\Links"
          New-Item -ItemType Directory -Force -Path $wingetPath | Out-Null
          Copy-Item infisical.exe "$wingetPath\infisical.exe"
          $output = & "$wingetPath\infisical.exe" vault 2>&1 | Out-String
          Write-Host "Output: $output"
          if ($output -notmatch "winget upgrade Infisical.Infisical") {
            Write-Error "Expected 'winget upgrade Infisical.Infisical', got: $output"
            exit 1
          }

  integration-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v4
        with:
          go-version: "1.24.13"
      - name: Build CLI
        run: go build -o infisical .

      - name: Test brew path detection
        run: |
          mkdir -p /tmp/homebrew/bin
          cp infisical /tmp/homebrew/bin/infisical
          output=$(/tmp/homebrew/bin/infisical vault 2>&1 || true)
          echo "Output: $output"
          echo "$output" | grep -q "brew update" || (echo "Expected brew instruction, got: $output" && exit 1)

      - name: Test npm path detection
        run: |
          mkdir -p /tmp/node_modules/@infisical/cli/bin
          cp infisical /tmp/node_modules/@infisical/cli/bin/infisical
          output=$(/tmp/node_modules/@infisical/cli/bin/infisical vault 2>&1 || true)
          echo "Output: $output"
          echo "$output" | grep -q "npm update -g @infisical/cli" || (echo "Expected npm instruction, got: $output" && exit 1)

  integration-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v4
        with:
          go-version: "1.24.13"
      - name: Build CLI
        run: go build -o infisical .

      - name: Test apt path detection
        run: |
          sudo cp infisical /usr/bin/infisical
          output=$(/usr/bin/infisical vault 2>&1 || true)
          echo "Output: $output"
          echo "$output" | grep -q "apt-get" || (echo "Expected apt-get instruction, got: $output" && exit 1)

      - name: Test npm path detection
        run: |
          mkdir -p $HOME/.npm-global/lib/node_modules/@infisical/cli/bin
          cp infisical $HOME/.npm-global/lib/node_modules/@infisical/cli/bin/infisical
          output=$($HOME/.npm-global/lib/node_modules/@infisical/cli/bin/infisical vault 2>&1 || true)
          echo "Output: $output"
          echo "$output" | grep -q "npm update -g @infisical/cli" || (echo "Expected npm instruction, got: $output" && exit 1)
