name: CLI E2EE Tests

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    name: CLI End-to-End Testing

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - name: Install dependencies
        run: go get .
      - name: Build the CLI
        run: go build -o infisical-cli
      - name: Checkout infisical repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: infisical/infisical
          path: infisical
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          docker system prune -af
          df -h
      - name: Test with the Go CLI
        run: go test -v -timeout 30m -count=1 github.com/infisical/cli/e2e-tests/proxy github.com/infisical/cli/e2e-tests/relay
        working-directory: ./e2e
        env:
          INFISICAL_BACKEND_DIR: ${{ github.workspace }}/infisical/backend
          INFISICAL_LICENSE_KEY: ${{ secrets.INFISICAL_LICENSE_KEY }}
          INFISICAL_CLI_EXECUTABLE: ${{ github.workspace }}/infisical-cli
          CLI_E2E_DEFAULT_RUN_METHOD: subprocess

  agent-test:
    runs-on: ubuntu-latest
    name: Agent End-to-End Testing

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - name: Install dependencies
        run: go get .
      - name: Build the CLI
        run: go build -o infisical-cli
      - name: Checkout infisical repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: infisical/infisical
          path: infisical
      - name: Test Certificate Agent
        run: go test -v -timeout 30m -count=1 github.com/infisical/cli/e2e-tests/agent
        working-directory: ./e2e
        env:
          INFISICAL_LICENSE_KEY: ${{ secrets.INFISICAL_LICENSE_KEY }}
          INFISICAL_BACKEND_DIR: ${{ github.workspace }}/infisical/backend
          INFISICAL_CLI_EXECUTABLE: ${{ github.workspace }}/infisical-cli
          CLI_E2E_DEFAULT_RUN_METHOD: subprocess
  pam-test:
    runs-on: ubuntu-latest
    name: PAM End-to-End Testing

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - name: Install dependencies
        run: go get .
      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/pam/handlers/rdp/native/target
          key: rdp-bridge-cargo-${{ runner.os }}-${{ hashFiles('packages/pam/handlers/rdp/native/Cargo.lock') }}
          restore-keys: rdp-bridge-cargo-${{ runner.os }}-
      - name: Install pinned Rust toolchain
        working-directory: packages/pam/handlers/rdp/native
        run: rustup show active-toolchain
      - name: Build Rust RDP bridge
        working-directory: packages/pam/handlers/rdp/native
        run: cargo build --release
      - name: Build the CLI
        run: CGO_ENABLED=1 go build -tags rdp -o infisical-cli
      - name: Install RDP test dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends freerdp2-x11 xvfb
      - name: Checkout infisical repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: infisical/infisical
          path: infisical
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          docker system prune -af
          df -h
      - name: Test PAM Resources
        run: go test -v -timeout 30m -count=1 github.com/infisical/cli/e2e-tests/pam
        working-directory: ./e2e
        env:
          INFISICAL_BACKEND_DIR: ${{ github.workspace }}/infisical/backend
          INFISICAL_LICENSE_KEY: ${{ secrets.INFISICAL_LICENSE_KEY }}
          INFISICAL_CLI_EXECUTABLE: ${{ github.workspace }}/infisical-cli
          CLI_E2E_DEFAULT_RUN_METHOD: subprocess

