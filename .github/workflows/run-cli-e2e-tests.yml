name: CLI E2EE Tests

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
  workflow_call:

jobs:
  # CLI and Agent tests temporarily disabled to catch second flake mode.
  # test: ...
  # agent-test: ...
  pam-test:
    runs-on: ubuntu-latest
    name: PAM End-to-End Testing

    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.9"
      - name: Install dependencies
        run: go get .
      - name: Build the CLI
        run: go build -o infisical-cli
      - name: Checkout infisical repo
        uses: actions/checkout@v6
        with:
          repository: infisical/infisical
          path: infisical
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          docker system prune -af
          df -h
      - name: Test PAM SSH (loop until failure or 10 passes)
        run: |
          for i in $(seq 1 10); do
            echo "========== RUN $i of 10 =========="
            if ! go test -v -timeout 30m -count=1 -run TestPAM_SSH github.com/infisical/cli/e2e-tests/pam; then
              echo "FAILED on run $i"
              exit 1
            fi
            echo "PASSED run $i"
            sleep 15
          done
          echo "All 10 runs passed"
        working-directory: ./e2e
        env:
          INFISICAL_BACKEND_DIR: ${{ github.workspace }}/infisical/backend
          INFISICAL_LICENSE_KEY: ${{ secrets.INFISICAL_LICENSE_KEY }}
          INFISICAL_CLI_EXECUTABLE: ${{ github.workspace }}/infisical-cli
          CLI_E2E_DEFAULT_RUN_METHOD: subprocess

